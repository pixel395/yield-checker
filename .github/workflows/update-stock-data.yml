name: Update Stock Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch stock data and write data.json
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, time, os

          ANNUAL_DIVIDENDS = {
              '9029': 50,  '9057': 96,  '9069': 50,  '9072': 74,
              '7267': 70,  '7272': 50,  '7292': 0,
              '8630': 150, '8725': 155, '8766': 211,
              '1343': 92,  '3003': 60,  '3231': 36,  '3276': 60,
              '3465': 200, '3475': 46,  '8929': 53,  '8931': 70,  '8999': 32,
              '5857': 120,
              '6504': 160, '6652': 130, '6670': 44,  '6718': 130,
              '6919': 80,  '9880': 70,  '6678': 0,   '6745': 0,   '6785': 0,
              '9513': 100, '9536': 70,
              '5464': 36,
              '9303': 103, '9304': 54,  '9368': 34,  '9381': 100, '9364': 0,
              '3597': 500,
              '7729': 222, '7723': 0,   '7749': 0,
              '2003': 280, '2296': 320, '2503': 74,  '2602': 180,
              '2914': 234, '2924': 67,  '2269': 0,
              '3834': 25,  '4486': 28,  '4674': 58,  '4725': 100,
              '4743': 80,  '4768': 85,  '4832': 68,  '9432': 5,
              '9433': 80,  '9651': 66,  '9658': 133, '9698': 52,
              '9709': 55,  '2317': 0,   '3771': 0,   '3817': 0,
              '4752': 0,   '9687': 0,   '4719': 0,   '3901': 0,
              '8473': 85,
              '3050': 46,  '3179': 47,  '7463': 40,
              '1605': 100,
              '1414': 46,  '1736': 58,  '1820': 220, '1870': 90,
              '1911': 50,  '1925': 175, '1928': 144, '1939': 65,
              '1951': 66,  '1723': 0,   '1976': 0,   '1980': 0,
              '9233': 44,
              '8306': 74,  '8309': 170, '8316': 157,
              '3431': 98,  '3433': 70,  '5988': 92,  '7989': 70,
              '6345': 60,  '6381': 83,  '6392': 210, '6432': 210,
              '6458': 50,  '6322': 0,   '6454': 0,   '6246': 0,
              '4008': 200, '4041': 140, '4042': 100, '4063': 106,
              '4220': 47,  '4248': 36,  '4471': 170, '4996': 24,
              '5208': 88,  '7931': 130, '7995': 150, '4401': 0,   '4097': 0,
              '2763': 55,  '2768': 165, '3023': 72,  '3076': 110,
              '3562': 36,  '7464': 60,  '7483': 100, '8001': 42,
              '8031': 115, '8058': 110, '8130': 155, '9837': 72,
              '9882': 58,  '9986': 100, '7438': 0,   '9960': 0,
              '4502': 200, '4503': 78,  '4536': 38,  '4540': 144,
              '3943': 52,
              '7811': 68,  '7820': 36,  '7921': 120, '7949': 130,
              '7966': 110, '7994': 104, '7839': 0,
              '7164': 115, '8424': 158, '8439': 72,  '8584': 200, '8593': 45,
              '2124': 36,  '2136': 70,  '2154': 85,  '2163': 84,
              '2169': 74,  '2379': 95,  '2391': 44,  '2393': 72,
              '2475': 63,  '2483': 75,  '2498': 125, '4318': 35,
              '4345': 29,  '4659': 95,  '4848': 63,  '6073': 62,
              '6196': 180, '6539': 56,  '9639': 85,  '9757': 42,
              '9769': 103, '9795': 88,  '2185': 0,   '4641': 0,   '4792': 0,
              '5105': 130, '5184': 164, '5186': 0,
              '5334': 186, '5357': 90,  '5393': 152, '7943': 114, '5388': 0,
              '5011': 0,
          }

          UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'

          # 既存 data.json を読み込んでベースラインとする
          existing_stocks = {}
          if os.path.exists('data.json'):
              try:
                  with open('data.json', encoding='utf-8') as f:
                      old = json.load(f)
                  existing_stocks = old.get('stocks', {})
                  print(f'Loaded {len(existing_stocks)} existing stocks as baseline')
              except Exception as e:
                  print(f'Could not load existing data.json: {e}')

          # 数字コードのみ Stooq に送る（545A 等は除外）、個別フェッチ
          codes = sorted([c for c in ANNUAL_DIVIDENDS if c.isdigit()])
          new_prices = {}
          fetch_success = 0
          fetch_fail = 0

          for code in codes:
              url = f'https://stooq.com/q/l/?s={code}.jp&f=sd2t2ohlcv&e=csv'
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': UA})
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      raw = resp.read().decode('utf-8').strip()
                  # Format: CODE.JP,DATE,TIME,OPEN,HIGH,LOW,CLOSE,VOLUME
                  parts = raw.split(',')
                  if len(parts) >= 7 and parts[-2] not in ('N/D', ''):
                      try:
                          price = float(parts[-2])
                          if price > 0:
                              new_prices[code] = price
                              fetch_success += 1
                      except ValueError:
                          fetch_fail += 1
                  else:
                      fetch_fail += 1
              except Exception as e:
                  print(f'  {code} failed: {e}')
                  fetch_fail += 1
              time.sleep(0.3)

          print(f'Total fetched: {len(new_prices)} prices (success={fetch_success}, fail={fetch_fail})')

          # 新しい価格で既存データを上書き、取得できなかったものは既存値を保持
          stocks_out = dict(existing_stocks)
          updated_count = 0
          for code, ann_div in ANNUAL_DIVIDENDS.items():
              if code in new_prices:
                  price = new_prices[code]
                  div_yield = round(ann_div / price * 100, 4) if ann_div > 0 else 0.0
                  stocks_out[code] = {'price': price, 'yield': div_yield, 'change': 0}
                  updated_count += 1

          source = 'stooq' if updated_count > 0 else 'static'
          result = {
              'updated': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'source': source,
              'stocks': stocks_out,
          }
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print(f'data.json written: {len(stocks_out)} total stocks ({updated_count} updated from Stooq)')
          PYEOF

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
