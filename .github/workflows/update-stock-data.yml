name: Update Stock Data

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分 (UTC) に実行
  workflow_dispatch:        # 手動実行も可

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch stock data and write data.json
        run: |
          python3 - <<'PYEOF'
          import json, csv, urllib.request, io, time

          STOCKS = {
              '9029': {'name': 'ヒガシHD',          'annualDividend': 50},
              '9057': {'name': '遠州トラック',       'annualDividend': 96},
              '9069': {'name': 'センコーグループHD', 'annualDividend': 50},
              '9072': {'name': 'ニッコンHD',         'annualDividend': 74},
              '7267': {'name': 'ホンダ',             'annualDividend': 70},
              '7272': {'name': 'ヤマハ発',           'annualDividend': 50},
              '8630': {'name': 'SOMPOHD',           'annualDividend': 150},
              '8725': {'name': 'MS&AD',             'annualDividend': 155},
              '8766': {'name': '東京海上',           'annualDividend': 211},
          }

          UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
          stooq_symbols = ','.join(k + '.jp' for k in STOCKS)
          url = f'https://stooq.com/q/l/?s={stooq_symbols}&f=sd2t2ohlcv&e=csv'

          req = urllib.request.Request(url, headers={'User-Agent': UA})
          with urllib.request.urlopen(req, timeout=15) as resp:
              raw = resp.read().decode('utf-8')

          reader = csv.DictReader(io.StringIO(raw))
          stocks_out = {}
          for row in reader:
              sym = row.get('Symbol', '')
              code = sym.upper().replace('.JP', '')
              try:
                  price = float(row.get('Close', 0) or row.get('Last', 0))
              except ValueError:
                  continue
              if price <= 0 or code not in STOCKS:
                  continue
              ann_div = STOCKS[code]['annualDividend']
              div_yield = round(ann_div / price * 100, 4)
              stocks_out[code] = {
                  'price': price,
                  'yield': div_yield,
                  'change': 0,
              }

          result = {
              'updated': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'source': 'stooq',
              'stocks': stocks_out,
          }
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          print('data.json written:', list(stocks_out.keys()))
          PYEOF

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
