        .stock-code { font-size: 11px; color: #aaa; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
        .change-pct { font-size: 11px; font-weight: 600; padding: 1px 5px; border-radius: 6px; }
        .change-pct.up   { color: #d32f2f; background: #ffebee; }
        .change-pct.down { color: #1565c0; background: #e3f2fd; }
        .change-pct.flat { color: #666;    background: #f5f5f5; }
        .achieved-badge { background: #00b84c; color: white; padding: 5px 12px; border-radius: 14px; font-size: 13px; font-weight: 800; display: none; letter-spacing: 1px; animation: pop 0.3s ease; }
        .stock-card.achieved .achieved-badge { display: inline-block; }
        .gakucho-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; background: #fff3cd; color: #856404; border: 1px solid #ffc107; margin-left: 5px; vertical-align: middle; }

        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .stock-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .metric { text-align: center; background: #f7f8fa; border-radius: 10px; padding: 8px 4px; }
        .metric-label { font-size: 10px; color: #999; margin-bottom: 3px; }
        .metric-value { font-size: 15px; font-weight: 800; color: #1a1a2e; }
        .yield-current { color: #e94560; }
        .stock-card.achieved .yield-current { color: #00b84c; }
        .yield-target { font-size: 14px; color: #888; }
        .yield-bar-wrap { background: #f0f2f5; border-radius: 8px; height: 6px; overflow: hidden; margin-bottom: 8px; }

        .ext-link { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 7px 4px; border-radius: 8px; font-size: 11px; font-weight: 600; text-decoration: none; border: 1px solid; transition: opacity 0.15s; -webkit-tap-highlight-color: transparent; }

    '6073': { price: 1515 }, '6196': { price: 1400 }, '6539': { price: 985 }, '9639': { price: 2148 },
    '9757': { price: 1164 }, '9769': { price: 2386 }, '9795': { price: 2418 },
    '5105': { price: 3762 }, '5184': { price: 4115 },
    '5334': { price: 7516 }, '5357': { price: 1799 }, '5393': { price: 2895 }, '7943': { price: 3360 },
};

const STOCK_MAP = Object.fromEntries(STOCKS.map(s => [s.code, s]));

// 学長推奨銘柄
const GAKUCHO_CODES = new Set([
    '9069','7267','8630','8766','3003','6652','6718','9513','5464','9303',
    '9368','2003','2914','3834','4674','4743','4768','4832','9432','9433',
    '9698','1414','1928','1951','9233','8306','8316','7989','6345','6381',
    '4008','4041','4042','4220','7931','7995','3076','7483','8001','8031',
    '8058','8130','9882','9986','4502','4540','7820','7921','8424','8439',
    '8584','8593','2124','2169','2391','2393','2475','6539','9639','9757',
    '9769','9795','5334','1723','1976','1980','2317','3771','3817','4641',
    '4752','5011','5186','5388','6322','6454','6745','7292','7438','7749',
    '9960','9687','4719','9364','4097','3901',
]);
let stockData      = {};
let dataSource     = 'static';
let dataUpdatedAt  = null;   // data.json の updated 文字列
let currentFilter  = 'all';

function fetchWithTimeout(url, ms = 10000) {
    const ctrl  = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), ms);
    return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

// data.json レスポンスを解析して stockData を更新
// 利回りは常に 年間配当 ÷ 現在株価 × 100 で再計算
function applyDataJson(jsonStocks) {
    Object.entries(jsonStocks).forEach(([code, d]) => {
        const price  = d.price ?? null;
        const annDiv = STOCK_MAP[code]?.annualDividend ?? 0;
        const yieldVal = (price != null && price > 0 && annDiv > 0)
            ? (annDiv / price) * 100 : null;
        stockData[code] = { price, yield: yieldVal, change: d.change ?? 0 };
    });
}

async function fetchAllStocks() {
    const btn  = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.disabled = true;
    icon.classList.add('spinning');
    document.getElementById('stockList').innerHTML    = '<div class="loading"><div class="spinner"></div>データを取得中...</div>';
    document.getElementById('lastUpdated').textContent = '更新中...';
    document.getElementById('errorBanner').innerHTML  = '';

    // ── 1. data.json（GitHub Actions が毎時更新）
    try {
        const res = await fetchWithTimeout('./data.json?_=' + Date.now(), 10000);
        if (res.ok) {
            const data = await res.json();
            if (data?.stocks && Object.keys(data.stocks).length > 0) {
                applyDataJson(data.stocks);
                dataSource = data.source ?? 'stooq';
                dataUpdatedAt = data.updated
                    ? new Date(data.updated).toLocaleString('ja-JP', { hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
                    : new Date().toLocaleString('ja-JP', { hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                document.getElementById('lastUpdated').textContent =
                    `最終更新: ${dataUpdatedAt}  [Stooq + 配当固定値]`;
                icon.classList.remove('spinning');
                btn.disabled = false;
                renderStocks();
                return;
            }
        }
    } catch (e) {
        console.warn('data.json fetch failed:', e.message);
    }

    // ── 2. 静的フォールバック（配当から利回りを再計算）
    stockData = {};
    STOCKS.forEach(s => {
        const p = STATIC_DATA[s.code]?.price ?? null;
        const yieldVal = (p != null && p > 0 && s.annualDividend > 0)
            ? (s.annualDividend / p) * 100 : null;
        stockData[s.code] = { price: p, yield: yieldVal, change: 0 };
    });
    dataSource    = 'static';
    dataUpdatedAt = null;
    document.getElementById('lastUpdated').textContent = '参考値を表示中（GitHub Actions が未実行）';
    document.getElementById('errorBanner').innerHTML   =
        `<div class="error-banner">⚠️ data.json が見つかりません。<br>GitHub Actions が実行されると自動更新されます。</div>`;
    icon.classList.remove('spinning');
    btn.disabled = false;
    renderStocks();
}

function filterStocks(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderStocks();
}

function renderStocks() {
    document.getElementById('totalCount').textContent = STOCKS.length;

    let achievedCount = 0;
    STOCKS.forEach(s => {
        const d = stockData[s.code];
        if (d?.yield != null && d.yield >= s.targetYield && s.targetYield < 90) achievedCount++;
    });
    document.getElementById('achievedCount').textContent = achievedCount;
    document.getElementById('achievedRate').textContent  =
        Math.round(achievedCount / STOCKS.length * 100) + '%';

    let filtered = STOCKS;
    if (currentFilter === 'achieved') {
        filtered = STOCKS.filter(s => {
            const d = stockData[s.code];
            return d?.yield != null && d.yield >= s.targetYield && s.targetYield < 90;
        });
    } else if (currentFilter !== 'all') {
        filtered = STOCKS.filter(s => s.industry === currentFilter || s.type === currentFilter);
    }

    if (filtered.length === 0) {
        document.getElementById('stockList').innerHTML = '<div class="no-results">該当銘柄はありません</div>';
        return;
    }

    // 静的データは「参考値」バッジ、更新済みは更新日時を表示
    const srcBadge = dataSource === 'static'
        ? `<span class="source-badge source-static">参考値</span>`
        : dataUpdatedAt
            ? `<span class="source-badge source-stooq">${dataUpdatedAt} 更新</span>`
            : '';

    const html = filtered.map(stock => {
        const d          = stockData[stock.code] || {};
        const price      = d.price != null ? Math.round(d.price).toLocaleString('ja-JP') : '---';
        const yieldVal   = d.yield  != null ? d.yield  : null;
        const yieldStr   = yieldVal != null ? yieldVal.toFixed(2) + '%' : '---';
        const changeVal  = d.change ?? 0;
        const isAchieved = yieldVal != null && stock.targetYield < 90 && yieldVal >= stock.targetYield;
        const barPct     = (yieldVal != null && stock.targetYield > 0 && stock.targetYield < 90)
            ? Math.min(Math.round(yieldVal / stock.targetYield * 100), 100) : 0;
        const typeClass  = stock.type === 'ディフェンシブ' ? 'tag-defensive' : 'tag-cyclical';

        let changeClass = 'flat', changeSign = '';
        if (changeVal > 0) { changeClass = 'up';   changeSign = '+'; }
        if (changeVal < 0) { changeClass = 'down'; }
        const changeBadge = d.change != null
            ? `<span class="change-pct ${changeClass}">${changeSign}${changeVal.toFixed(2)}%</span>` : '';

        const targetStr = stock.targetYield >= 90 ? '未設定' : stock.targetYield.toFixed(1) + '%';

        return `
        <div class="stock-card ${isAchieved ? 'achieved' : ''}">
            <div class="stock-header">
                <div>
                    <div class="stock-name">${stock.name}${GAKUCHO_CODES.has(stock.code) ? '<span class="gakucho-badge">学長</span>' : ''}</div>
                    <div class="stock-code">${stock.code} · ${stock.industry} ${changeBadge}</div>
                </div>
                <div class="achieved-badge">達成</div>
            </div>
            <div class="stock-metrics">
                <div class="metric">
                    <div class="metric-label">現在値${dataUpdatedAt ? `<span class="update-time">${dataUpdatedAt}</span>` : ''}</div>
                    <div class="metric-value">¥${price}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">現在利回り ${srcBadge}</div>
                    <div class="metric-value yield-current">${yieldStr}</div>
                </div>
                <div class="metric">
                    <div class="metric-label">期待利回り</div>
                    <div class="metric-value yield-target">${targetStr}</div>
                </div>
            </div>
            <div class="yield-bar-wrap">
                <div class="yield-bar" style="width:${barPct}%"></div>
            </div>
            <div class="tags">
                <span class="tag tag-industry">${stock.industry}</span>
                <span class="tag ${typeClass}">${stock.type}</span>
            </div>
            <div class="ext-links">
                <a class="ext-link irbank"  href="https://irbank.net/${stock.code}/results" target="_blank" rel="noopener noreferrer">📊 IRバンク</a>
                <a class="ext-link buffett" href="https://www.buffett-code.com/company/${stock.code}" target="_blank" rel="noopener noreferrer">🏦 バフェット</a>
                <a class="ext-link kabutan" href="https://kabutan.jp/stock/?code=${stock.code}" target="_blank" rel="noopener noreferrer">📈 株探</a>
            </div>
        </div>`;
    }).join('');

    document.getElementById('stockList').innerHTML = html;
}

// 起動時は静的データを即描画（更新はボタンのみ）
(function initStatic() {
    STOCKS.forEach(s => {
        const p = STATIC_DATA[s.code]?.price ?? null;
        const yieldVal = (p != null && p > 0 && s.annualDividend > 0)
            ? (s.annualDividend / p) * 100 : null;
        stockData[s.code] = { price: p, yield: yieldVal, change: 0 };
    });
    dataSource    = 'static';
    dataUpdatedAt = null;
    document.getElementById('lastUpdated').textContent = '更新ボタンで最新データを取得できます';
    renderStocks();
})();
</script>
